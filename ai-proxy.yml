name: ai-proxy

services:
  isf-ai-proxy:
    image: agenticriver/ai-proxy:main
    container_name: isf-ai-proxy
    ports:
      - "8066:8080"
    env_file:
      - .env.ai_proxy
    environment:
      - ENABLE_VIRTUAL_KEY=${ENABLE_VIRTUAL_KEY:-false}
      - DATABASE_URL=${VIRTUAL_KEY_DB_URL:-}
      - VIRTUAL_KEY_YAML_PATH=/app/data/virtual_key_admin.yml
      - DATA_DIR=/app/data
    volumes:
      - ./data/proxy_data:/app/data
      - ./models.yaml:/app/models.yaml
    restart: unless-stopped
    networks:
      - default

networks:
  default:
    driver: bridge
